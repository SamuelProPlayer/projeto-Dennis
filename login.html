<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">

    <title>Site cadastro utfpr</title>
</head>
<link rel="shortcut icon" href="image-1024-7e52a971b4bf99a543aedf43530f5414.png">
<body>

    <nav class="nav"> 

        <div class="btn-nav"> 
            <a href="https://www.utfpr.edu.br/campus/guarapuava"><button>UTFPR</button></a>
            <a href="https://www.utfpr.edu.br/bibliotecas/acervo-digital"><button>APP Mobile</button></a>
            <a href="https://webapp.utfpr.edu.br/bibservices/minhaBiblioteca?ISBN="><button>Livros</button></a>
            <a href="https://www.utfpr.edu.br/contato/ouvidoria"><button>Ouvidoria</button></a>
            <a href="index.html"><button id="btn-premium">Login</button></a>
            <a href="login.html"> <button id="btn-add">Criar Conta</button></a>
        </div>

        <div id="logo">
            <a href="index.html"> <img src="image-1024-7e52a971b4bf99a543aedf43530f5414.png" height="10%"></a>
        </div>
    </nav> 

    <div class="main"> 

        <div class="inicio"> 
            <h1>Faça cadastro <br> Entre no acervo digital da UTFPR</h1>
        </div> 

        <div class="login"> 
            <div class="card-login"> 
                <h1>Cadastro</h1>

                <div class="textfield">
                    <label for="usuario">Usuário</label>
                    <input type="text" name="usuario" placeholder="Usuario">
                </div>

                <div class="textfield">
                    <label for="email">Email</label>
                    <input type="text" name="email" placeholder="Email">
                </div>

                <div class="textfield">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" placeholder="Senha">
                </div>

                <div class="label1"> 
                <input type="checkbox">
                <label class="label1">Li e concordo com os termos da politica de provacidade </label> </div> 

                <button class="btn-cadastro">Cadastrar</button>
            </div> 
        </div> 


    </div> 
    
</body>
</html>
